        .diff-removed { background-color: #fee2e2; color: #991b1b; }

        /* Verschilt van beide: meng rood + paars in de achtergrond. */

            color: #831843;

        .dark .diff-removed-both {

        .dark .col-sv1657, .dark .col-hsv, .dark .col-sv2027, .dark .col-sv2026 {

            background-color: #374151;
            border-color: #4b5563;

    <script>
        const dmp = new diff_match_patch();

        function extractNotes(text) {
            if (!text) return { cleanText: "", notes: [] };
            const notes = [];
            const combinedRegex = /(<.*?>|\$.*?\$)/g;
            const cleanText = text.replace(combinedRegex, (match) => {
                const noteContent = match.replace(/[<>\$]/g, '').trim();
                notes.push(noteContent);
                return String.fromCharCode(0xE000 + notes.length - 1);
            });
            return { cleanText, notes };
        }

        function stripLeadingVerseNum(text) {
            if (!text) return text;
            return text.replace(/^\s*\d+\s+/, '');
        }

        function escapeForDiff(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderNoteText(s) {
            return escapeHtml(String(s ?? '').replace(/\$([^$]+)\$/g, '$1'));
        }

        function injectMarkers(html, notes) {
            return html.replace(/[-]/g, (m) => {
                const idx = m.charCodeAt(0) - 0xE000;
                const note = notes[idx] || "";
                return `<span class="marker" title="${note.replace(/"/g, '&quot;')}">[${idx + 1}]</span>`;
            });
        }

        function renderPlain(text) {
            if (!text) return { html: null, notes: [] };
            const n = extractNotes(text);
            const html = injectMarkers(escapeForDiff(n.cleanText), n.notes);
            return { html, notes: n.notes };
        }

        // External-side diff: laat zien wat in 'extern' staat dat NIET in SV2026 staat
        // → groen highlight op de externe regel.
        function renderExternalDiff(textExt, text2026) {
            const nExt = extractNotes(stripLeadingVerseNum(textExt || ""));
            const n2026 = extractNotes(stripLeadingVerseNum(text2026 || ""));

            if (!textExt) return { html: null, notes: [] };
            if (!text2026) {
                return { html: injectMarkers(escapeForDiff(nExt.cleanText), nExt.notes), notes: nExt.notes };
            }

            const diffs = dmp.diff_main(n2026.cleanText, nExt.cleanText);
            dmp.diff_cleanupSemantic(diffs);

            let raw = "";
            diffs.forEach(part => {
                const type = part[0];
                const text = escapeForDiff(part[1]);
                if (type === 0) raw += text;
                else if (type === 1) raw += `<span class="diff-added">${text}</span>`;
                // type === -1: in SV2026 maar niet in extern → niet renderen op externe regel
            });
            return { html: injectMarkers(raw, nExt.notes), notes: nExt.notes };
        }

        // Per-character classificatie van SV2026: "match in 2027?" en "match in HSV?"
        // Returnt { html, notes } met tekst gegroepeerd in spans per highlight-class.
        function renderSv2026DualDiff(text2026, textSv2027, textHsv) {
            if (!text2026) return { html: null, notes: [] };
            const n2026 = extractNotes(stripLeadingVerseNum(text2026));
            const clean = n2026.cleanText;
            const len = clean.length;

            const flagsSv2027 = new Array(len).fill(true); // default: present
            const flagsHsv = new Array(len).fill(true);

            const fillFlags = (otherText, flags) => {
                if (!otherText) {
                    // Geen externe vergelijking mogelijk → markeer alles als "present"
                    return;
                }
                const nOther = extractNotes(stripLeadingVerseNum(otherText));
                const diffs = dmp.diff_main(clean, nOther.cleanText);
                dmp.diff_cleanupSemantic(diffs);
                let pos = 0;
                for (const [type, txt] of diffs) {
                    if (type === 0) {
                        // gelijk in beide → blijft true
                        pos += txt.length;
                    } else if (type === -1) {
                        // staat in SV2026 maar niet in extern → false
                        for (let i = 0; i < txt.length; i++) flags[pos + i] = false;
                        pos += txt.length;
                    }
                    // type === 1: alleen in extern → advance niet de SV2026-cursor
                }
            };

            fillFlags(textSv2027, flagsSv2027);
            fillFlags(textHsv, flagsHsv);

            // Groepeer opeenvolgende chars met dezelfde class.
            const classOf = (i) => {
                const inSv2027 = flagsSv2027[i];
                const inHsv = flagsHsv[i];
                if (inSv2027 && inHsv) return "";
                if (!inSv2027 && !inHsv) return "diff-removed-both";
                if (!inSv2027) return "diff-removed";       // alleen niet in SV2027
                return "diff-removed-hsv";                  // alleen niet in HSV
            };

            let html = "";
            let i = 0;
            while (i < len) {
                const cls = classOf(i);
                let j = i + 1;
                while (j < len && classOf(j) === cls) j++;
                const chunk = clean.slice(i, j);
                const escaped = escapeForDiff(chunk);
                html += cls ? `<span class="${cls}">${escaped}</span>` : escaped;
                i = j;
            }
            return { html: injectMarkers(html, n2026.notes), notes: n2026.notes };
        }

        function renderNotesPanel(notes, verseNumber) {
            if (!notes) return '';
            // Defensief: notes hoort een array van objects te zijn (zie OUTPUT_SCHEMA.md),
            // maar oudere/ongeldige data kan een losse string of een array-met-strings zijn.
            if (typeof notes === 'string') notes = [{ type: 'context', reason: notes }];
            if (!Array.isArray(notes) || notes.length === 0) return '';
            const normalized = notes.map(n => (typeof n === 'string') ? { type: 'context', reason: n } : n);
            const panelId = `notes-panel-v${verseNumber}`;
            const items = normalized.map(note => {
                const type = note.type || 'note';
                const badgeClass = ['twijfel', 'afwijking', 'context'].includes(type) ? `badge-${type}` : 'badge-default';
                const lines = [];
                lines.push(`<div><span class="note-badge ${badgeClass}">${escapeHtml(type)}</span>${note.subject ? `<span class="font-semibold">${renderNoteText(note.subject)}</span>` : ''}</div>`);
                if (note.context) lines.push(`<div><span class="font-medium">Context:</span> ${renderNoteText(note.context)}</div>`);
                if (note.choice) lines.push(`<div><span class="font-medium">Keuze:</span> ${renderNoteText(note.choice)}</div>`);
                if (Array.isArray(note.alternatives) && note.alternatives.length) {
                    lines.push(`<div><span class="font-medium">Alternatieven:</span> ${note.alternatives.map(renderNoteText).join(' / ')}</div>`);
                }
                if (note.reason) lines.push(`<div><span class="font-medium">Reden:</span> ${renderNoteText(note.reason)}</div>`);
                return `<div class="note-item">${lines.join('')}</div>`;
            }).join('');

            return `
                <div class="notes-panel">
                    <button class="notes-toggle" type="button" data-target="${panelId}" aria-expanded="false">
                        <span>Notes (${notes.length})</span>
                        <span class="notes-caret">▸</span>
                    </button>
                    <div class="notes-body" id="${panelId}" hidden>${items}</div>
                </div>
            `;
        }

        function createFootnoteSection(notes, title, labelClass) {
            const chip = `<span class="col-label ${labelClass}">${title}</span>`;
            if (!notes || notes.length === 0) {
                return `
                    <div class="footnote-list">
                        ${chip}
                        <div class="text-xs italic font-normal text-gray-400 mt-1">—</div>
                    </div>
                `;
            }
            return `
                <div class="footnote-list">
                    ${chip}
                    <ol class="list-decimal list-inside space-y-1 mt-1 text-gray-700 dark:text-gray-300">
                        ${notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}
                    </ol>
                </div>
            `;
        }

        function renderTextRow(label, labelClass, htmlContent, fallback) {
            return `
                <div>
                    <h4 class="col-label ${labelClass}">${label}</h4>
                    <p class="bible-text text-base">${htmlContent ?? fallback ?? '<span class="italic text-gray-400 text-xs">—</span>'}</p>
                </div>
            `;
        }

        const MAX_CHAPTER = { LUK: 24, MRK: 16 };
        const BOOK_NAMES = { LUK: 'Lucas', MRK: 'Marcus' };

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const book = params.get('book') || 'LUK';
            const chapter = parseInt(params.get('chapter') || '1');
            const maxCh = MAX_CHAPTER[book] || 1;

            const contentEl = document.getElementById('content');
            const chapterLabel = document.getElementById('chapter-label');

            const bookSelect = document.getElementById('book-select');
            for (const b of Object.keys(MAX_CHAPTER)) {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = BOOK_NAMES[b] || b;
                if (b === book) opt.selected = true;
                bookSelect.appendChild(opt);
            }
            bookSelect.onchange = () => {
                window.location.search = `?book=${bookSelect.value}&chapter=1`;
            };

            const chapterSelect = document.getElementById('chapter-select');
            for (let i = 1; i <= maxCh; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `Hoofdstuk ${i}`;
                if (i === chapter) opt.selected = true;
                chapterSelect.appendChild(opt);
            }
            chapterSelect.onchange = () => {
                window.location.search = `?book=${book}&chapter=${chapterSelect.value}`;
                window.scrollTo(0,0);
            };
            document.getElementById('theme-toggle').onclick = () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            };

            const scrollBtn = document.getElementById('scroll-top');
            scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            const toggleScrollBtn = () => {
                if (window.scrollY > 400) {
                    scrollBtn.classList.remove('hidden');
                    scrollBtn.classList.add('flex');
                } else {
                    scrollBtn.classList.remove('flex');
                    scrollBtn.classList.add('hidden');
                }
            };
            window.addEventListener('scroll', toggleScrollBtn, { passive: true });
            toggleScrollBtn();

            contentEl.addEventListener('click', (e) => {
                const btn = e.target.closest('.notes-toggle');
                if (!btn) return;
                const body = document.getElementById(btn.dataset.target);
                if (!body) return;
                const open = body.hasAttribute('hidden');
                if (open) {
                    body.removeAttribute('hidden');
                    btn.setAttribute('aria-expanded', 'true');
                    btn.querySelector('.notes-caret').textContent = '▾';
                } else {
                    body.setAttribute('hidden', '');
                    btn.setAttribute('aria-expanded', 'false');
                    btn.querySelector('.notes-caret').textContent = '▸';
                }
            });

            try {
                const response = await fetch(`diff_all_${book}_${chapter}.json`);
                if (!response.ok) throw new Error(`Hoofdstuk ${chapter} niet gevonden`);
                const data = await response.json();

                chapterLabel.innerText = `${data.book} ${data.chapter}`;

                contentEl.innerHTML = '';

                // Introduction
                const intro = data.introduction;
                if (intro && (intro.original || intro.sv2026 || intro.sv2027)) {
                    const introOrig = renderPlain(intro.original);
                    const introSv2027 = renderPlain(intro.sv2027);
                    const intro2026 = renderPlain(intro.sv2026);
                    contentEl.innerHTML += `
                        <div class="bg-gradient-to-r from-purple-50/30 via-green-50/30 to-sky-50/40 dark:from-purple-900/10 dark:via-green-900/10 dark:to-sky-900/10 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                            <h3 class="text-center text-xs font-bold mb-6 uppercase tracking-widest text-gray-500">Inleiding</h3>
                            <div class="space-y-5">
                                ${renderTextRow('1657', 'col-sv1657', introOrig.html)}
                                ${renderTextRow('HSV', 'col-hsv', null, '<span class="italic text-gray-400 text-xs">— geen HSV-equivalent —</span>')}
                                ${renderTextRow('Initiatief SV2027', 'col-sv2027', introSv2027.html)}
                                ${renderTextRow('Modernisatie', 'col-sv2026', intro2026.html)}
                            </div>
                        </div>
                    `;
                }

                // Verses — gestapelde tekst, kanttekeningen onderaan in 4 kolommen.
                data.verses.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'group pb-8 border-b border-gray-200 dark:border-gray-800 last:border-0';

                    const orig = renderPlain(v.original);
                    const hsvDiff = renderExternalDiff(v.hsv, v.sv2026);
                    const sv2027Diff = renderExternalDiff(v.sv2027, v.sv2026);
                    const sv2026Dual = renderSv2026DualDiff(v.sv2026, v.sv2027, v.hsv);

                    card.innerHTML = `
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-lg font-bold text-gray-700 dark:text-gray-300">Vers ${v.verse_number}</span>
                            ${v.status !== 'modernized' ? `<span class="text-[9px] bg-amber-100 dark:bg-amber-900/30 text-amber-700 px-1.5 py-0.5 rounded uppercase font-bold">Pending</span>` : ''}
                        </div>

                        <div class="space-y-5 pl-3 border-l-2 border-gray-100 dark:border-gray-800">
                            ${renderTextRow('1657', 'col-sv1657', orig.html)}
                            ${renderTextRow('HSV', 'col-hsv', hsvDiff.html)}
                            ${renderTextRow('Initiatief SV2027', 'col-sv2027', sv2027Diff.html)}
                            <div>
                                <h4 class="col-label col-sv2026">Modernisatie</h4>
                                <p class="bible-text text-base">${sv2026Dual.html || `<span class="italic text-gray-400 text-xs">Nog niet gemoderniseerd</span>`}</p>
                                ${renderNotesPanel(v.notes, v.verse_number)}
                            </div>
                        </div>

                        <!-- Kanttekeningen / voetnoten — vier kolommen naast elkaar -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 pl-3 mt-4">
                            <div>${createFootnoteSection(orig.notes, "1657", "col-sv1657")}</div>
                            <div>${createFootnoteSection(hsvDiff.notes, "HSV", "col-hsv")}</div>
                            <div>${createFootnoteSection(sv2027Diff.notes, "Initiatief SV2027", "col-sv2027")}</div>
                            <div>${createFootnoteSection(sv2026Dual.notes, "Modernisatie", "col-sv2026")}</div>
                        </div>
                    `;
                    contentEl.appendChild(card);
                });

                // Epilogue
                const epi = data.epilogue;
                if (epi && (epi.original || epi.sv2026 || epi.sv2027)) {
                    const epiOrig = renderPlain(epi.original);
                    const epiSv2027 = renderPlain(epi.sv2027);
                    const epi2026 = renderPlain(epi.sv2026);
                    const epiCard = document.createElement('div');
                    epiCard.className = 'bg-gradient-to-r from-purple-50/30 via-green-50/30 to-sky-50/40 dark:from-purple-900/10 dark:via-green-900/10 dark:to-sky-900/10 rounded-xl p-6 border border-gray-200 dark:border-gray-800';
                    epiCard.innerHTML = `
                        <h3 class="text-center text-xs font-bold mb-6 uppercase tracking-widest text-gray-500">Epiloog</h3>
                        <div class="space-y-5">
                            ${renderTextRow('1657', 'col-sv1657', epiOrig.html)}
                            ${renderTextRow('HSV', 'col-hsv', null, '<span class="italic text-gray-400 text-xs">— geen HSV-equivalent —</span>')}
                            ${renderTextRow('Initiatief SV2027', 'col-sv2027', epiSv2027.html)}
                            ${renderTextRow('Modernisatie', 'col-sv2026', epi2026.html)}
                        </div>
                    `;
                    contentEl.appendChild(epiCard);
                }

            } catch (err) {
                contentEl.innerHTML = `
                    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-12 text-center">
                        <p class="text-red-700 dark:text-red-300 font-bold text-xl">Data niet gevonden</p>
                        <p class="text-gray-600 dark:text-gray-400 mt-2">${err.message}</p>
                        <div class="mt-8 flex justify-center gap-4">
                             <a href="?book=LUK&chapter=1" class="text-sky-600 underline">Lucas 1</a>
                             <a href="?book=MRK&chapter=1" class="text-sky-600 underline">Marcus 1</a>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
